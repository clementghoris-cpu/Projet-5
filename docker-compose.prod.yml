services:
  api:
    ports:
      - "80:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: energy_prod

  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: energy_prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data  

volumes:
  postgres_data_prod: